title: Niloen Backup
description: >-
  Niloen Backup (NBackup) — an Amanda-inspired, run-based backup system with
  first-class disk, cloud, and tape storage. Backups are immutable, self-describing,
  and restore with stock tools.
remote_theme: just-the-docs/just-the-docs

# Served at the custom domain (Pages custom domain + backup.niloen.com CNAME),
# so the site lives at the root: url is the domain and baseurl stays blank.
# (As a plain project page it would be url: https://niloen.github.io with
# baseurl: /nbackup.)
url: https://backup.niloen.com
baseurl: ""

# Just-the-Docs options
color_scheme: dark
search_enabled: true
search:
  heading_level: 3
  previews: 3

heading_anchors: true

# A persistent link back to the source in the top-right.
aux_links:
  GitHub:
    - https://github.com/Niloen/nbackup
aux_links_new_tab: true

# Footer
back_to_top: true
back_to_top_text: "Back to top"
last_edit_timestamp: false
footer_content: >-
  Niloen Backup is developed by <a href="https://niloen.com">Niloen AB</a>.
  Free software under <a href="https://github.com/Niloen/nbackup/blob/main/LICENSE">GPLv3</a>.

# Internal design notes live under docs/design/ and are intentionally kept out of
# the published navigation (they remain readable as raw files in the repo).
exclude:
  - design/
  - Gemfile
  - Gemfile.lock
  - vendor/

plugins:
  - jekyll-remote-theme
