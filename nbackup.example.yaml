# Example NBackup configuration.
# Copy to nbackup.yaml and adjust.

# The dump cycle: the target — and hard maximum — time between fulls for every
# DLE (default 7d). It is the main scheduling knob. Each run fulls the DLEs due
# by their deadline and takes incrementals in between; light runs are
# automatically filled by pulling a future full forward, bounded by free
# capacity. A full never ages past one cycle.
cycle: 7d

# Incremental level bump threshold (Amanda's bumppercent), default 5. An
# incremental sits at level 1 — re-dumping everything since the full each run —
# and only climbs to a higher level when doing so saves at least this percent of
# the full-dump size. Higher = level 1 stays the common case and deeper levels are
# rarer (shorter restore chains, more overlap between incrementals); lower = climb
# more eagerly to shrink each incremental. Tune per how active your data is.
# bump_percent: 5

# Named storage definitions. Each is a Volume with a `type`, its own capacity and
# retention, plus type-specific connection parameters. Slots can be copied
# between media with `nb copy` (e.g. `nb copy <slot> --to lto`).
media:
  fast-disk:
    type: disk          # a filesystem directory (local or NFS)
    path: /var/lib/nbackup/catalog
    capacity: 20TB      # space NBackup may use here; `nb prune` reclaims oldest to fit
    # minimum_age: 30d  # retention floor before a slot may be retired (default: one cycle)
  lto:
    type: tape          # a ROBOTIC LIBRARY of bays behind one drive
    dir: /var/lib/nbackup/vtape   # a file-backed virtual library (no hardware)
    # device: /dev/nst0           # OR a real single drive (no-rewind device), which
    #                             # is a one-bay library: `bays` does not apply to it,
    #                             # and its capacity is the tape's own (set part_size
    #                             # instead of volume_size, since EOT is only hit, not read)
    bays: 20            # physical bays (dir-backed library); total capacity is bays × volume_size
    volume_size: 6TB    # per-volume capacity — a write past it hits end-of-tape
    minimum_age: 180d
    appendable: true    # default: pack many runs per tape (Bacula-style) until full.
                        # false = one run per tape (Amanda-style).
    # Tapes carry a self-describing identity label (file 0) that NBackup verifies
    # before writing — so a wrong, foreign, or still-active reel is never clobbered.
    # A robotic library addresses physical bays; the label is read after mounting:
    #   nb medium lto                     # inventory bay -> label (and what's loaded)
    #   nb label lto lto-0001             # grab a blank bay and label it
    #   nb load lto bay-02                # mount a bay (or: nb load --label lto lto-0007)
    #   nb label --relabel lto lto-0042   # recycle an aged-out tape
  desk-drive:
    type: tape          # a SINGLE DRIVE you change tapes in by hand
    dir: /var/lib/nbackup/station   # file-backed station (a real one is device: /dev/nst0)
    mode: manual        # one drive whose reel the operator swaps by hand; the
                        # other reels sit on an offline shelf the system can't see
    reels: 6            # how many tapes are in the room (file-backed sim only — a
                        # real drive just shows what's loaded and a shelf you stock yourself)
    volume_size: 6TB
    minimum_age: 180d
    appendable: false   # typical for a hand-changed drive: one run per tape
    # When a backup or restore needs a different tape, NBackup prompts you to swap
    # the reel in the drive and waits (unattended runs error instead of blocking):
    #   nb medium desk-drive              # the drive + reels in the room
    #   nb load desk-drive reel-03        # load a reel by id (or --label by name)
    #   nb label desk-drive lto-0001      # label whatever reel is loaded
  cloud:
    type: cloud         # an OBJECT STORE via the Go CDK (gocloud.dev/blob)
    url: s3://company-backups?region=eu-north-1   # the backend is the URL scheme:
                        #   s3://bucket?region=…   S3 (and S3-compatible: MinIO/R2/B2/Wasabi)
                        #   gs://bucket            Google Cloud Storage
                        #   azblob://container     Azure Blob
    # prefix: nbackup/  # optional: confine all keys under this folder in the bucket
    capacity: 50TB      # space NBackup may use here; `nb prune` reclaims oldest to fit
    # minimum_age: 30d  # retention floor before a slot may be retired (default: one cycle)
    throughput: 50MB/s  # bandwidth cap to/from this medium (default: uncapped). Network
                        # politeness — the read/write peer of `nice` — so a dump or sync
                        # doesn't saturate the office uplink, and a restore/drill download
                        # honors the same budget. Bytes/sec; the `/s` is optional. Several
                        # concurrent workers to one medium share this single cap.
    # Credentials are NOT configured here — they come from each cloud SDK's standard
    # environment (AWS_*, GOOGLE_APPLICATION_CREDENTIALS, AZURE_*), so secrets stay
    # out of the config file. An object store is address-identified: no labels, no
    # swaps, nothing to inventory — it behaves like the disk medium.
    #
    # COST (optional). With no `cost:` block a cloud medium prices itself from its URL
    # scheme (s3:// = AWS, gs:// = GCS, azblob:// = Azure; local disk/tape have no
    # recurring cloud bill), so `nb plan` already shows $/month and the next run's
    # marginal cost, and a cloud restore warns about egress first. Pricing is a flat
    # estimate — storage + egress + request (the provider invoice is authoritative);
    # NBackup does not model Glacier/Deep-Archive lifecycle tiers. Add a block only to
    # override a rate (a region's egress) or pick a different provider table:
    # cost:
    #   provider: aws-s3            # base rate table (default: inferred from the url)
    #   storage_per_gb_month: 0.021 # recurring $/GiB-month
    #   egress_per_gb: 0.05         # $/GiB transferred out (read off the medium)
    #   get_per_1000: 0.0004        # $ per 1000 read requests

# Which medium slots are created on (the landing).
landing: fast-disk

# HOLDING DISK (Amanda's holding disk). Mark a fast disk/cloud medium `holding: true` and it
# becomes a scratch buffer the dump flows THROUGH on the way to the landing — "here's some
# disk you can use for performance". Dumps land on it in PARALLEL (no single-drive clamp),
# then one taper drains each committed archive to the landing and reclaims the disk, so a
# slow tape drive runs at disk speed and a small disk feeds a much larger tape. The landing
# (e.g. `lto`) stays the authoritative tier; the holding disk is transient.
#
#   media:
#     lto:     { type: tape, dir: /var/lib/nbackup/vtape, bays: 20, volume_size: 6TB }
#     scratch: { type: disk, path: /var/spool/nbackup, capacity: 500GB, holding: true }
#   landing: lto
#   parallelism: { workers: 4 }   # dumps run parallel onto the holding disk
#
# `capacity` bounds the in-flight back-pressure (a slow tape ⇒ dumpers wait, never overfill).
# The holding disk must be disk/cloud, not the landing, and there is at most one. A crashed
# run's un-flushed archives stay recorded on the holding disk in the catalog; `nb dump`
# auto-drains them on the next run, or run `nb flush` to drain them explicitly.

# Replication (Amanda's vaulting). Each rule mirrors one medium's sealed slots onto
# another — the batch, idempotent form of `nb copy`. A cron line of
# `nb dump && nb sync` lands fast on disk, then pushes copies offsite.
# `nb sync` (no --to) runs every rule; `nb sync --to lto` syncs one ad-hoc target.
# Sync copies by default; pass --dry-run (-n) to preview. The source defaults to the
# landing medium; set `from` (or --from) to copy from any other medium (e.g. to
# restage tape back to disk, or to chain a second offsite tier).
# sync:
#   - to: cloud           # mirror landing -> object store
#   - to: lto
#     last: 4             # copy only the 4 most recent slots (does NOT remove older
#                         # ones already on tape — use `nb prune` to trim)
#   - from: lto           # second tier: tape -> deep archive (source need not be landing)
#     to: deep-archive

# Recovery drills (`nb drill`). A drill is the recoverability proof checksum
# verification cannot give: it actually restores a risk-biased sample of DLEs
# (decrypt + decompress + tar) to scratch, so it catches a lost key, a scheme/tar
# drift, a broken incremental chain, or an unreadable offsite copy — the "0 errors"
# digit of 3-2-1-1-0. It runs by default (writing only an inspectable ledger,
# drill-ledger.json, in the workdir); `--dry-run` (-n) previews it. The block below is
# the cron default, so a hands-off line is `nb dump && nb sync && nb drill
# --unattended` (unattended never prompts and skips any target needing a tape swap).
# drill:
#   window: 30d         # every DLE should be drilled at least this often
#   sample: 1           # DLEs drilled per run (a risk-biased rotation)
#   from: cloud         # which copy to drill (default: the landing medium). Point it
#                       # at the OFFSITE copy periodically — that path (cloud GET +
#                       # egress + offsite-key decrypt) is the one most likely to be
#                       # silently misconfigured.
#   tier: structural    # checksum | structural | chain | stock
#                       #   checksum   = re-hash payload vs seal (integrity only)
#                       #   structural = decrypt+decompress+`tar -t`, members vs seal
#                       #                (no write; exercises the key + scheme)
#                       #   chain      = real point-in-time chain restore to scratch
#                       #   stock      = restore via the documented gpg/zstd/tar
#                       #                one-liner (proves recovery needs no NBackup)
#   worm: true          # probe the medium for WORM/immutability (Object Lock / LTO
#                       # WORM): keeps one fixed probe object and checks that deleting
#                       # it is refused. NBackup only DETECTS immutability; you
#                       # configure it operator-side on the storage.
#   unattended: false   # cron mode: never prompt; skip targets needing a tape swap

# Unattended alerting. Every dump/sync/verify/drill/prune writes a machine-readable
# run record to the workdir (run-log.jsonl + run-summary.json); `nb report`
# summarizes the recent runs and recovery health. The `notify:` block makes failures
# loud without a human at the console: a failed run reaches the configured channels,
# and `nb report --notify` mails the nightly digest. A notification problem is only
# ever a stderr warning — it never fails or blocks the backup.
#
# SECRETS ARE NEVER STORED HERE. An SMTP password or a Slack/Discord/PagerDuty
# webhook URL is referenced by the NAME of an environment variable (password_env,
# url_env) and resolved at send time, like cloud credentials. A literal `password:`
# or `token:` key is rejected as an unknown field — the config never hoards secrets.
# notify:
#   on_failure: [email, slack]   # channels to alert on a failed run
#                                # (omit to alert EVERY backend — failures must be loud)
#   # on_success: [email]        # A successful `nb dump` notifies EVERY backend by
#                                # default — the nightly "backups happened" signal, so
#                                # an empty inbox means cron didn't run, not that all is
#                                # well. Other commands' success is opt-in: list backends
#                                # here to also get success notices for sync/verify/drill/
#                                # prune (the list then applies to dump too).
#   digest: [email]              # channels for `nb report --notify` (the nightly summary)
#   backends:
#     email:
#       type: smtp
#       host: smtp.example.com
#       port: 587                # default 587
#       from: nbackup@example.com
#       to: [ops@example.com]    # one or more recipients
#       username: nbackup        # optional (defaults to `from`)
#       password_env: SMTP_PASS  # env var holding the password — NOT the password
#     local-mail:
#       type: sendmail           # hand off to the local MTA (postfix/sendmail/exim)
#       from: nbackup@example.com
#       to: [ops@example.com]    # one or more recipients
#       # sendmail_path: /usr/sbin/sendmail   # default; the binary the MTA provides
#     slack:
#       type: webhook            # generic JSON POST (Slack/Discord/PagerDuty-compatible)
#       url_env: SLACK_WEBHOOK_URL   # env var holding the (secret) webhook URL
#       # url: https://hooks.example.com/non-secret   # only for a non-secret endpoint
#       # template: text         # payload field for the message (default "text"; Slack/Discord ready)
#       # headers:               # optional extra HTTP headers
#       #   Authorization: "Bearer ..."

# Where the catalog's local cache lives. This is the catalog's own directory,
# independent of any storage medium — the catalog is a cache over the whole pool,
# not part of one medium. Defaults to ./nbackup-catalog.
# workdir: /var/lib/nbackup/catalog

# Where archivers keep their incremental state (for gnutar, the .snar listed-
# incremental library). This is a HOST property, not an archiver option, and is a
# dedicated location BESIDE the workdir — never beneath it: the workdir is the
# disposable rebuild-from-media cache, while this state is precious (losing a DLE's
# base forces its next run to a full). Defaults to ./nbackup-state. Both default
# RELATIVE TO THE WORKING DIRECTORY, so a cron job that runs `nb` from elsewhere
# must set an ABSOLUTE path here (and for workdir) or it will silently re-full.
# `nb check` warns when either resolves to a relative path, for exactly this reason.
# state_dir: /var/lib/nbackup/state
# A per-host override (e.g. for a remote client's own path) lives under hosts:.

# Let a dump auto-label a *blank* tape instead of requiring `nb label` first.
# Off by default: explicit labeling is what makes the overwrite guard meaningful.
# It never overwrites foreign or non-blank media.
# auto_label: false

# (The GNU tar binary is a per-archiver option — `tar_path` on a `archivers:` entry
# below, e.g. "gtar" on macOS/BSD — not a global, mirroring Amanda's per-
# application GNUTAR-PATH.)

# Compression. Archives are piped through an external compressor child (like
# Amanda), so the CPU work is in a separate, throttleable process. The scheme
# binary must be on PATH (zstd by default; gzip; or "none" for no compression).
# This block is the config-wide default; a dumptype may set its own `compress`
# block to override it wholesale — the exact peer of `encrypt` below (different
# scheme/level, or a client-side `at`). The scheme is recorded per-archive, so
# restore reverses it from the artifact alone.
compress:
  scheme: zstd        # zstd | gzip | none
  level: 3           # compression level (0 = scheme default)
  threads: 0         # compressor worker threads (0 = scheme default; zstd: single)
  # program: /usr/bin/zstd   # optional binary override
  # at: server        # server (default) | client — where compression runs for a
  #                   # remote DLE (config-wide default; usually set per-dumptype)

# Encryption. After compression, archives can be piped through an external
# encryptor child (gpg), like Amanda's encrypt program. The scheme name is a
# compiled primitive (gpg | none) recorded per-archive, so restore reverses it
# from the artifact alone — no config needed. The KEY is never stored: with a
# public-key recipient, gpg finds the matching private key in the keyring on the
# restoring host; losing the key loses the data. This block is the config-wide
# default; a dumptype may set its own `encrypt` block to override it wholesale.
# encrypt:
#   scheme: gpg                      # gpg | none (default none)
#   recipient: backups@example.com   # gpg public-key recipient (asymmetric)
#   # passphrase_file: /etc/nbackup/secret   # gpg symmetric, instead of a recipient
#   # program: /usr/bin/gpg                  # optional binary override

# Run several dumps at once (Amanda's inparallel). Keep workers x compressor
# threads <= cores to avoid oversubscribing CPU.
parallelism:
  workers: 1         # concurrent DLE dumps per run

# Optional CPU politeness: run child processes under `nice -n <value>`.
# nice: 10

# Named archiver definitions (Amanda's "application"): a registered archiver type
# plus its content-independent options (how tar runs, regardless of what you point
# it at). An undeclared name is treated as a bare type with default options, so
# `archiver: gnutar` works with no block here. Most setups need just one.
archivers:
  default:
    type: gnutar
    one-file-system: "true"
    sparse: "true"
    # tar_path: gtar     # GNU tar binary (use "gtar" on macOS/BSD)
    # (Incremental state is NOT an archiver option — its location is the host-level
    #  `state_dir:` above; the archiver only owns its format knobs like tar_path.)

# Named dumptypes (Amanda's "dumptype"): an archiver reference plus per-DLE policy —
# what to skip (exclude) and encryption. Excludes live here, not on the archiver:
# skipping logs is a decision about *this data*, not about how tar runs, so different
# DLEs reuse one archiver and differ only by dumptype. A DLE selects one.
dumptypes:
  default:
    archiver: default
  no-logs:
    archiver: default
    exclude: ["*.log", "*.tmp"]
  # A dumptype can override the default compression and/or encryption wholesale
  # (no field merge — restate the whole block). E.g. a stricter key, or a cheaper
  # scheme for already-compressed data:
  # finance:
  #   archiver: default
  #   compress:
  #     scheme: zstd
  #     level: 19                 # spend more CPU on this data
  #   encrypt:
  #     scheme: gpg
  #     recipient: finance-key@example.com
  # A remote DLE can run compression and/or encryption on the CLIENT (Amanda's
  # compress/encrypt client), so only compressed ciphertext crosses the wire and
  # plaintext never leaves the source. encrypt.at: client requires compress.at: client
  # (encryption is downstream of compression). With a public-key recipient only the
  # public key need be on the client; the private key decrypts wherever it lives.
  # remote-secure:
  #   archiver: default
  #   compress:
  #     at: client                # server (default) | client
  #   encrypt:
  #     scheme: gpg
  #     recipient: backups@example.com
  #     at: client                # server (default) | client

# Remote sources over SSH. ANY source host that is not `localhost` is remote by default:
# NBackup runs stock tools (tar, and optionally the compressor + gpg) on the client over
# SSH — no NBackup software on the client, no daemon, no open port beyond SSH. NBackup
# stores no SSH secret: the key comes from your ssh config/agent. The client's .snar
# incremental library lives on the client (state_dir) — losing a client only forces its
# next dump to a full. Run `nb check` to verify each host is reachable and ready.
#
# Global SSH defaults applied to every remote host (Amanda's global auth settings):
# ssh:
#   user: backup
#   # port: "22"
#   identity_file: ~/.ssh/nbackup
#   options: ["-o", "StrictHostKeyChecking=accept-new"]
#
# `hosts:` is OPTIONAL and only OVERRIDES the defaults above for a specific host (it is
# NOT what makes a host remote). Per-host fields are merged over the global ssh: block.
# hosts:
#   app01:
#     ssh:
#       user: root                      # override just the user; inherit the rest
#     # state_dir: /var/lib/nbackup/state   # this host's incremental-state root (host-
#     #                                     # level, sibling of ssh:; default ./nbackup-state)
#     archivers:
#       gnutar:
#         tar_path: /usr/bin/tar        # client GNU tar ("" = tar on the client PATH)

# The disklist: grouped by dumptype, then host, then the paths to back up.
# NBackup backs up filesystem trees. For a live database, snapshot or dump it to
# a file first and back that up — application-consistent dumps are not built in.
#
# IMPORTANT: the host `localhost` is backed up LOCALLY; ANY other host name is a
# REMOTE SSH client (see the `ssh:`/`hosts:` section above) and `nb check`/`nb dump`
# will try to connect to it. For a single machine, keep the host as `localhost`.
sources:
  default:
    localhost: [/home, /etc]
  # A second host (any name but `localhost`) is dumped over SSH — uncomment once
  # the `ssh:`/`hosts:` section is set up:
  # no-logs:
  #   web01: [/srv/www, /opt/app]
