name: Bug report
description: Report a problem with NBackup
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `nb …`, I expected … but got …
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact commands and the relevant parts of your config.
      placeholder: |
        1. Config: …
        2. Command: `nb …`
        3. Observed: …
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any error output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: NBackup version / commit
      description: Output of `nb version` or the `main` commit you built from.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, GNU tar version, storage target (disk / S3 / GCS / …).
    validations:
      required: true
