name: Feature request
description: Suggest an idea or improvement for NBackup
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        NBackup is Amanda-inspired and greenfield. Proposals that reuse existing
        concepts and respect the layering in
        [ARCHITECTURE.md](../blob/main/ARCHITECTURE.md) are the easiest to land.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like NBackup to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
