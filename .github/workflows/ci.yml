# CI: the same three checks CLAUDE.md requires for every change.
# The suite is written to pass without zstd (tests use scheme `none`); nothing
# beyond GNU tar + gzip (already on the runner) is installed, matching the
# documented test environment.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
